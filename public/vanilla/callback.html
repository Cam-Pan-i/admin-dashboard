<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Verifying Account — Bob's Market</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #0a0a0c;
      --card: rgba(20, 20, 24, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #ffffff;
      --text-main: #f1f5f9;
      --text-dim: #737373;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    .bg-orb {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(140px);
      z-index: 0;
      opacity: 0.15;
    }
    .orb-1 { background: #ffffff; top: -200px; left: -200px; }
    .orb-2 { background: #ffffff; bottom: -200px; right: -200px; }

    .card {
      position: relative;
      z-index: 10;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 64px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow: 0 32px 128px rgba(0,0,0,0.6);
      animation: entry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes entry {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .loader-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 32px;
    }

    .orbit {
      position: absolute;
      inset: 0;
      border: 2px solid var(--border);
      border-radius: 50%;
      animation: spin 3s linear infinite;
    }
    .orbit-dot {
      position: absolute;
      top: -4px; left: 50%;
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 16px #fff;
    }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .discord-logo {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      color: #fff;
    }

    .heading {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .status {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
      font-weight: 500;
    }

    .footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .pulse {
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 12px #fff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.9); } }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="card">
    <div class="loader-wrap">
      <div class="orbit">
        <div class="orbit-dot"></div>
      </div>
      <svg class="discord-logo" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.01.043.02.06a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.182 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.419-2.157 2.419zm7.974 0c-1.182 0-2.157-1.085-2.157-2.419 0-1.333.946-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.419-2.157 2.419z"/>
      </svg>
    </div>

    <h2 class="heading" id="heading">Synchronizing</h2>
    <p class="status" id="status">Establishing secure link with your Discord identity.</p>

    <div class="footer">
      <div class="pulse"></div>
      Secure Protocol Active
    </div>
  </div>

  <script>
    (function() {
      const heading = document.getElementById('heading');
      const status  = document.getElementById('status');

      function setState(type, title, msg) {
        heading.textContent = title.toUpperCase();
        status.textContent = msg;
        if (type === 'error') {
          heading.style.color = '#ef4444';
          document.querySelector('.pulse').style.background = '#ef4444';
        }
      }

      window.addEventListener('load', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');

        if (error) {
          setState('error', 'Denied', 'Authorization was revoked. Process terminated.');
          return;
        }

        if (code) {
          setState('', 'Validating', 'Finalizing secure connection to the central registry...');
          setTimeout(() => {
            window.location.href = '/api/callback?code=' + encodeURIComponent(code);
          }, 1600);
          return;
        }

        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = fragment.get('access_token');
        if (accessToken) {
          setState('', 'Processing', 'Analyzing session token for secure entry...');
          setTimeout(() => {
            window.location.href = '/api/callback?access_token=' + encodeURIComponent(accessToken);
          }, 1600);
          return;
        }

        setState('error', 'Expired', 'No active session token found. Please restart authentication.');
      });
    })();
  </script>
</body>
</html>
