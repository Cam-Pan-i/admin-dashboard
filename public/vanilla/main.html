<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob's Market — Discord Community & Shop</title>
    <meta name="description"
        content="Join Bob's Market — the premier Discord community marketplace. Buy accounts, join our server, and explore live member stats.">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .home-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 24px 60px;
            position: relative;
            z-index: 1;
        }

        .home-card {
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-xl);
            padding: 52px 44px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-heavy), 0 0 60px rgba(88, 101, 242, 0.08);
            position: relative;
            overflow: hidden;
        }

        .home-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(88, 101, 242, 0.6), transparent);
        }

        .server-avatar-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .server-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid var(--border-strong);
            object-fit: cover;
            background: var(--bg-elevated);
            box-shadow: 0 0 40px rgba(88, 101, 242, 0.2);
        }

        .server-status-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(135deg, var(--accent), var(--purple)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
        }

        .status-pip {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 3px solid var(--bg-base);
            background: var(--text-muted);
            transition: background 0.4s;
        }

        .server-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .server-tagline {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .home-stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 32px;
            padding: 18px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .home-stat {
            text-align: center;
        }

        .home-stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .home-stat-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .home-divider {
            width: 1px;
            height: 32px;
            background: var(--border);
        }

        .quick-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }

        .quick-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 11px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .quick-link:hover {
            background: var(--accent-dim);
            border-color: rgba(88, 101, 242, 0.3);
            color: var(--text-primary);
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-muted);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <!-- Navbar -->
    <nav class="nav">
        <a href="/main" class="nav-brand">
            <div class="nav-logo"><i data-lucide="shopping-cart"></i></div> Bob's Market
        </a>
        <a href="https://discord.gg/McCU2nPegT" target="_blank" rel="noopener" class="nav-join">Join Server</a>
    </nav>

    <div class="home-wrap">
        <div class="home-card">
            <!-- Server Avatar -->
            <div class="server-avatar-wrap">
                <div class="server-status-ring"></div>
                <img id="server-icon" class="server-avatar"
                    src="https://cdn.discordapp.com/icons/1466511568614330484/a_placeholder.webp"
                    onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="Server Icon">
                <div class="status-pip" id="status-pip"></div>
            </div>

            <!-- Name -->
            <div class="server-name" id="server-name">Bob's Market</div>
            <div class="server-tagline">Advanced Discord Commerce & Analytics</div>

            <!-- Live Stats -->
            <div class="home-stats">
                <div class="home-stat">
                    <div class="home-stat-value" id="stat-online">—</div>
                    <div class="home-stat-label">
                        <span class="live-indicator">
                            <span class="live-dot"></span> Online
                        </span>
                    </div>
                </div>
                <div class="home-divider"></div>
                <div class="home-stat">
                    <div class="home-stat-value" id="stat-total">—</div>
                    <div class="home-stat-label">Total Personnel</div>
                </div>
                <div class="home-divider"></div>
                <div class="home-stat">
                    <div class="home-stat-value" id="stat-verified">—</div>
                    <div class="home-stat-label">Verified</div>
                </div>
            </div>

            <!-- Main CTA -->
            <a href="https://discord.gg/McCU2nPegT" target="_blank" rel="noopener" class="join-btn">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px">
                    <path
                        d="M19.27 4.57c-1.41-1.3-3.03-2.14-4.85-2.52-.16-.03-.31.05-.39.19-.21.36-.45.86-.61 1.25-1.99-.3-3.99-.3-5.98 0-.16-.39-.41-.89-.62-1.25-.08-.14-.23-.22-.39-.19-1.82.38-3.44 1.22-4.85 2.52-.06.06-.09.14-.1.22-.96 5.56-.7 11.02.6 16.3.01.03.02.06.05.08A19.9 19.9 0 0 0 8.1 23.95c.13.04.27-.01.35-.11.46-.63.87-1.29 1.22-2 .04-.08.02-.17-.06-.21a13.3 13.3 0 0 1-1.87-.89c-.08-.04-.09-.14-.02-.2.12-.09.25-.19.37-.29.06-.05.15-.05.21.01 3.92 1.79 8.18 1.79 12.06 0 .06-.06.15-.06.21-.01.12.1.25.2.37.29.07.06.06.16-.02.2-.59.33-1.2.63-1.87.89-.08.04-.1.13-.06.21.35.71.76 1.37 1.22 2 .08.1.22.15.35.11 2.02-.7 3.84-1.74 5.39-3.04.03-.02.04-.05.05-.08 1.5-6.13 1.1-11.58.4-16.3-.01-.08-.04-.16-.1-.22zM8.02 15.33c-1.18 0-2.16-1.08-2.16-2.42 0-1.33.95-2.42 2.16-2.42 1.21 0 2.18 1.09 2.16 2.42 0 1.33-.96 2.42-2.16 2.42zm7.97 0c-1.18 0-2.16-1.08-2.16-2.42 0-1.33.95-2.42 2.16-2.42 1.21 0 2.18 1.09 2.16 2.42 0 1.33-.95 2.42-2.16 2.42z" />
                </svg>
                Establish Connection
            </a>

            <p
                style="margin-top:32px; font-size:10px; color:var(--text-tiny); font-weight:700; text-transform:uppercase; letter-spacing:1px">
                © 2026 Bob's Market. Secured Interface.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/config.js"></script>
    <script>
        lucide.createIcons();
        const sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function loadHome() {
            try {
                const { data: ss } = await sb.from('server_stats').select('*').eq('guild_id', CONFIG.GUILD_ID).single();
                if (ss) {
                    if (ss.icon_url) {
                        const img = document.getElementById('server-icon');
                        img.src = ss.icon_url;
                        img.onerror = () => { img.src = 'https://cdn.discordapp.com/embed/avatars/0.png'; };
                    }
                    if (ss.name) document.getElementById('server-name').textContent = ss.name;
                    if (ss.verified_members != null) animCount(document.getElementById('stat-verified'), 0, ss.verified_members, 1200);
                }

                const { data: ms } = await sb.from('member_stats').select('online_members, total_members').eq('guild_id', CONFIG.GUILD_ID).order('timestamp', { ascending: false }).limit(1).single();
                if (ms) {
                    animCount(document.getElementById('stat-online'), 0, ms.online_members || 0, 1200);
                    animCount(document.getElementById('stat-total'), 0, ms.total_members || 0, 1200);
                    const pip = document.getElementById('status-pip');
                    pip.style.background = ms.online_members > 0 ? 'var(--green)' : 'var(--text-muted)';
                    if (ms.online_members > 0) pip.style.boxShadow = '0 0 14px var(--green)';
                }

                sb.channel('home-stats').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'member_stats', filter: `guild_id=eq.${CONFIG.GUILD_ID}` }, (p) => {
                    animCount(document.getElementById('stat-online'), parseInt(document.getElementById('stat-online').textContent.replace(/\D/g, '')) || 0, p.new.online_members || 0, 800);
                    animCount(document.getElementById('stat-total'), parseInt(document.getElementById('stat-total').textContent.replace(/\D/g, '')) || 0, p.new.total_members || 0, 800);
                }).subscribe();
            } catch (e) { console.error('Home load error:', e); }
        }

        function animCount(el, from, to, duration) {
            if (!el) return;
            let start = null;
            const step = ts => {
                if (!start) start = ts;
                const prog = Math.min((ts - start) / duration, 1);
                const ease = 1 - Math.pow(1 - prog, 4);
                el.textContent = Math.round(from + (to - from) * ease).toLocaleString();
                if (prog < 1) requestAnimationFrame(step);
                else el.textContent = to.toLocaleString();
            };
            requestAnimationFrame(step);
        }

        loadHome();
    </script>
</body>

</html>
